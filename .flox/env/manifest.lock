{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "uv": {
        "pkg-path": "uv"
      }
    },
    "hook": {
      "on-activate": "  uv python install 3.14\n\n  export PYTHON_DIR=\"$FLOX_ENV_PROJECT/.venv\"\n  if [ ! -d \"$PYTHON_DIR\" ]; then\n    echo \"Creating python virtual environment in $PYTHON_DIR\"\n    uv venv --python-preference=only-managed \"$PYTHON_DIR\"\n  fi\n\n\n  # Quietly activate venv and install packages in a subshell so\n  # that the venv can be freshly activated in the profile section.\n  (\n    source \"$PYTHON_DIR/bin/activate\"\n    uv sync --managed-python --all-groups --all-extras --active\n\n    if [ ! -e \"$FLOX_ENV_PROJECT/.git/hooks/pre-commit\" ]; then\n      prek install\n    fi\n  )\n"
    },
    "profile": {
      "bash": "  echo \"Activating python virtual environment\" >&2\n  source \"$PYTHON_DIR/bin/activate\"\n",
      "zsh": "  echo \"Activating python virtual environment\" >&2\n  source \"$PYTHON_DIR/bin/activate\"\n",
      "fish": "  echo \"Activating python virtual environment\" >&2\n  source \"$PYTHON_DIR/bin/activate.fish\"\n",
      "tcsh": "  echo \"Activating python virtual environment\" >&2\n  source \"$PYTHON_DIR/bin/activate.csh\"\n"
    },
    "options": {}
  },
