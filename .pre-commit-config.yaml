repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/pycqa/doc8
    rev: v2.0.0
    hooks:
      - id: doc8
  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 1.1.1
    hooks:
      - id: pyrefly-check
        pass_filenames: false
        language: system
